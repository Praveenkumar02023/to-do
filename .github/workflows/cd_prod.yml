name : deploy to production

on:
    push:
        branches:
            - production

jobs:
    deploy:
        runs-on: ubuntu-latest
        name : deploy to prod
        steps:
            - run: | 
                echo "${{secrets.SSH_PRIVATE_KEY}}" > ssh_key
                chmod 600 ssh_key

                ssh -o StrictHostKeyChecking=no -i ssh_key azureuser@20.244.11.230 << 'EOF'
                    set -e
                    
                    export NVM_DIR="$HOME/.nvm"
                    source "$NVM_DIR/nvm.sh"

                    nvm use 20

                    cd prod
                    cd to-do
                    git pull
                    rm -rf .next
                    npm ci
                    npm run build
                    pm2 reload prod-to-do
                EOF
        